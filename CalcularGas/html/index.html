<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Combustível</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <main class="container">
        <header>
            <h1>Consumo de Combustível</h1>
            <p>Calcule o gasto e a eficiência por km rodado</p>
        </header>

        <form id="formCalculadora">
            <section class="form-section">
                <div class="input-group">
                    <label for="inCombustivelComeco">Litros no início do dia:</label>
                    <input type="number" id="inCombustivelComeco" min="0" step="0.1" required placeholder="Ex: 50.0">
                </div>

                <div class="input-group">
                    <label for="inCombustivelFinal">Litros ao final do dia:</label>
                    <input type="number" id="inCombustivelFinal" min="0" step="0.1" required placeholder="Ex: 75.0">
                </div>
            </section>

            <section class="form-section">
                <div class="input-group">
                    <label for="inKmComeco">Km no início do dia:</label>
                    <input type="number" id="inKmComeco" min="0" step="0.1" required placeholder="Ex: 12500">
                </div>

                <div class="input-group">
                    <label for="inKmFinal">Km ao final do dia:</label>
                    <input type="number" id="inKmFinal" min="0" step="0.1" required placeholder="Ex: 12850">
                </div>
            </section>

            <div class="actions">
                <input type="submit" value="Calcular Desempenho" id="btnCalcular">
            </div>
        </form>

        <section class="results-area">
            <div class="result-item">
                <span class="label">Combustível Gasto:</span>
                <h3 id="outCombustivelGasto">--</h3>
            </div>
            <div class="result-item">
                <span class="label">Média (Km/L):</span>
                <h3 id="outKmL">--</h3>
            </div>
            <div class="result-item highlight">
                <span class="label">Valor por Km:</span>
                <h3 id="outValorDia">--</h3>
            </div>
        </section>
    </main>

    <script src="../js/calcularGasH.js"></script>
</body>

</html>
